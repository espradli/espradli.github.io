<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Trip 2026</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #e0e0e0; line-height: 1.6; background: #1a1a2e; }
  h1 { border-bottom: 3px solid #e74c3c; padding-bottom: 10px; color: #f0f0f0; }
  h2 { color: #e74c3c; margin-top: 40px; }
  h3 { color: #a0c4ff; }
  .phase { background: #16213e; border-left: 4px solid #e74c3c; padding: 15px 20px; margin: 20px 0; border-radius: 0 8px 8px 0; }
  .phase-header { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; color: #f0f0f0; }
  .dates { color: #999; font-size: 0.9em; }
  .golden-week { background: #2a2000; border-left-color: #f0ad4e; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
  .tag-confirmed { background: #27ae60; color: white; }
  .tag-tbd { background: #e67e22; color: white; }
  .logistics li { margin: 8px 0; }
  .note { font-style: italic; color: #999; }
  a { color: #6db3f2; }
  details { margin-top: 10px; }
  summary { cursor: pointer; font-size: 1.4em; color: #e74c3c; font-weight: bold; margin-top: 40px; padding: 5px 0; list-style: revert; }
  summary:hover { color: #ff6b6b; }
  summary .dates { color: #999; font-size: 0.65em; font-weight: normal; }
  details details { margin-top: 10px; margin-left: 16px; border-left: 2px solid #333; padding-left: 12px; }
  details details summary { font-size: 1em; margin-top: 10px; color: #a0c4ff; }
  .gw-item { border-left: 3px solid #f0ad4e; padding-left: 8px; margin-left: -8px; }
  .travel-break { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 12px 20px; margin: 30px 0; text-align: center; color: #999; font-weight: bold; }
  @media (max-width: 600px) {
    body { margin: 10px auto; padding: 0 12px; }
    h1 { font-size: 1.4em; }
    summary { font-size: 1.15em; margin-top: 25px; }
    .phase { padding: 10px 12px; margin: 12px 0; }
    .phase-header { font-size: 1em; }
    .tag { font-size: 0.7em; padding: 1px 6px; }
    .travel-break { padding: 8px 12px; font-size: 0.85em; margin: 20px 0; }
    .phase li { margin-bottom: 6px; }
  }
  @media print { body { margin: 20px; } details { display: block; } details > summary { list-style: none; } }
</style>
</head>
<body>
TBD
</body>
</html>
